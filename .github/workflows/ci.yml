name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
      - "fix/**"
  pull_request:

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: pip install .

      - name: Compile backend entrypoint
        run: python -m py_compile app/main.py

      - name: Start backend
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:8000/health > /tmp/health.json; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/backend.log
          exit 1

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" || true
          fi
