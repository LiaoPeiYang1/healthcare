services:
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - backend_data:/app/data
    expose:
      - "8000"

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  backend_data:
